<!doctype html>
<html lang="ko">
  <head>
    <base href="../">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>반려견 선택</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/pages/report.css">
    <script type="module" src="src/platforms/report-pet-select.js"></script>
  </head>
  <body>
    <main class="app-page-shell is-flex app-report-pet-select-screen" data-screen="appReportPetSelect" data-platform="app">
      <header class="app-report-pet-select-header" data-area="header">
        <a class="app-report-pet-select-back-button" href="./report/report-create.html" aria-label="알림장 작성으로 돌아가기" data-action="backToReportCreate">
          <img src="assets/icons/iconBack.svg" alt="">
        </a>
        <h1>반려견 선택</h1>
        <button class="app-report-pet-select-all-button" type="button" data-action="selectAllReportPets">전체 선택</button>
      </header>

      <section class="app-report-pet-select-content" data-area="content">
        <div class="app-report-pet-select-title-row">
          <h2>반려견 리스트</h2>
          <div class="app-report-pet-filter-group" data-area="petFilters">
            <button class="app-report-pet-filter-button" type="button" data-action="toggleReservationFilter">
              <span data-field="reservationFilterLabel">예약자</span>
              <img src="assets/icons/iconDropdown.svg" alt="">
            </button>
            <button class="app-report-pet-filter-button" type="button" data-action="toggleClassFilter">
              <span data-field="classFilterLabel">클래스</span>
              <img src="assets/icons/iconDropdown.svg" alt="">
            </button>
          </div>
        </div>

        <section class="app-report-pet-list" data-area="petList"></section>
        <p class="app-report-pet-empty is-hidden" hidden data-area="petListEmpty">선택한 옵션에 맞는<br>반려견이 없습니다.</p>
      </section>

      <button class="app-report-pet-complete-button" type="button" disabled data-action="completeReportPetSelection">완료</button>

      <section class="app-report-filter-sheet-overlay" hidden data-area="filterBottomSheet" data-state="closed">
        <div class="app-report-filter-sheet">
          <header class="app-report-filter-sheet-header">
            <button class="text-button" type="button" data-action="closeFilterBottomSheet">닫기</button>
            <h2 data-field="filterBottomSheetTitle">필터</h2>
            <span class="app-report-filter-sheet-spacer"></span>
          </header>
          <div class="app-report-filter-sheet-options" data-area="filterBottomSheetOptions"></div>
        </div>
      </section>
    </main>
  </body>
</html>
